<div class="admin-signup-container">
  <mat-card class="signup-card">
    <mat-card-header>
      <mat-card-title class="title">Create New Admin Account</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="handleSubmit($event)">
        <!-- Name -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput
                 type="text"
                 name="FullName"
                 [(ngModel)]="formData.FullName"
                 placeholder="Enter your full name"
                 required />
        </mat-form-field>

        <!-- Job Title -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Job Title</mat-label>
          <input matInput
                 type="text"
                 name="JobTitle"
                 [(ngModel)]="formData.JobTitle"
                 placeholder="Enter job title"
                 required />
        </mat-form-field>

        <!-- Location -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Location</mat-label>
          <input matInput
                 type="text"
                 name="Location"
                 [(ngModel)]="formData.Location"
                 placeholder="Enter location"
                 required />
        </mat-form-field>

        <!-- Email -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput
                 type="email"
                 name="Email"
                 [(ngModel)]="formData.Email"
                 placeholder="Enter your email"
                 required />
        </mat-form-field>

        <!-- Password -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput
                 type="password"
                 name="PasswordHash"
                 [(ngModel)]="formData.PasswordHash"
                 placeholder="Enter your password"
                 required />
        </mat-form-field>

        <!-- Confirm Password -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm Password</mat-label>
          <input matInput
                 type="password"
                 name="ConfirmPassword"
                 [(ngModel)]="formData.ConfirmPassword"
                 placeholder="Re-enter your password"
                 required />
        </mat-form-field>

        <!-- Submit Button -->
        <div class="form-group text-center">
          <button mat-raised-button class="full-width signup-btn" color="primary" type="submit">
            Register
          </button>
        </div>
      </form>
    </mat-card-content>

    <!-- Login Link -->
    <p class="login-link">
      Already have an account? <a routerLink="/admin-login">Login</a>
    </p>
  </mat-card>
</div>
