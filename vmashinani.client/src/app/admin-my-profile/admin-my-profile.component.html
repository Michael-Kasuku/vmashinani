<div class="admin-my-profile">
  <h2>Update Profile Picture</h2>
  <form [formGroup]="profileForm" (ngSubmit)="onUpdateProfile()" novalidate>
    <!-- Profile Picture -->
    <div class="form-group">
      <label for="profilePicture">Profile Picture</label>
      <input type="file" id="profilePicture" class="form-control" (change)="onFileSelected($event)" />
      <div class="preview" *ngIf="profilePicturePreview">
        <p>Preview:</p>
        <img [src]="profilePicturePreview" alt="Profile Preview" />
      </div>
      <small *ngIf="
          profileForm.get('profilePicture')?.touched &&
          profileForm.get('profilePicture')?.invalid
        "
             class="text-danger">
        Profile picture is required.
      </small>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary" [disabled]="profileForm.invalid">
      Update Profile Picture
    </button>
  </form>

  <!-- Displaying User Details -->
  <div class="user-details mt-4">
    <h3>User Information</h3>
    <ul class="list-group">
      <li class="list-group-item"><strong>Username:</strong> {{ username }}</li>
      <li class="list-group-item"><strong>Email Address:</strong> {{ email }}</li>
      <li class="list-group-item"><strong>Gender:</strong> {{ gender }}</li>
      <li class="list-group-item"><strong>Role:</strong> {{ role }}</li>
      <li class="list-group-item"><strong>Location:</strong> {{ location }}</li>
    </ul>
  </div>
</div>
