<div class="container">
  <mat-card class="forgot-password-card">
    <mat-card-title>Reset Your Password</mat-card-title>
    <mat-card-content>
      <form (ngSubmit)="onSubmit()" [formGroup]="forgotPasswordForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput
                 formControlName="email"
                 type="email"
                 placeholder="Enter your email"
                 required />
          <mat-error *ngIf="email?.invalid && email?.touched">
            {{ getEmailErrorMessage() }}
          </mat-error>
        </mat-form-field>
        <mat-progress-bar *ngIf="isLoading" mode="indeterminate" aria-label="Loading"></mat-progress-bar>
        <mat-error *ngIf="submissionError" class="submission-error">
          {{ submissionError }}
        </mat-error>
        <button mat-raised-button
                color="primary"
                class="full-width submit-button"
                [disabled]="isLoading || forgotPasswordForm.invalid"
                type="submit">
          Send Reset Link
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions class="card-actions">
      <a mat-button routerLink="/pet-owner-login">Remembered your password? Log in</a>
    </mat-card-actions>
  </mat-card>
</div>
